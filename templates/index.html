<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fake News Detector</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 200px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        .btn-submit { background-color: #007bff; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .btn-submit:hover { background-color: #0056b3; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 4px; font-weight: bold; font-size: 1.2em; text-align: center; }
        .text-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .text-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Automated Fake News Detector</h2>

        <form method="POST" action="/predict">
            <label for="news_text">News Article Text:</label>
            <textarea id="news_text" name="news_text" required>{{ news_text if news_text else '' }}</textarea>
            <button type="submit" class="btn-submit">Check News</button>
        </form>

        {% if result %}
            <div class="result-box {{ style }}">
                PREDICTION: This article is likely **{{ result }}**
            </div>
        {% endif %}
    </div>
</body>
</html>
